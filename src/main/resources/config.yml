# ============================================
#          AveliumLobby Configuration
# ============================================

# Мир, в котором находится лобби
world: "world"

# Зона лобби (два угла куба)
# Игрок ВНУТРИ этих координат считается "в лобби"
region:
  min-x: 140
  min-y: -63
  min-z: -77
  max-x: 220
  max-y: 132
  max-z: 3

# Точка спавна внутри лобби
spawn:
  x: 177.497
  y: 69.0
  z: -38.499
  yaw: 0.0
  pitch: 0.0

# Точка спавна в лобби BedWars (пока временная, потом изменим)
bedwars-lobby:
  world: "world"
  x: 177.497
  y: 69.0
  z: -38.499
  yaw: 0.0
  pitch: 0.0

# Мир выживания (куда телепортировать при выборе "Выживание")
survival-world: "world"

# Настройки лобби
settings:
  # Очищать инвентарь при входе в лобби
  clear-inventory: true
  # Выдавать компас меню в 5 слот
  give-menu-item: true
  # Автоматически открывать меню при входе (в дополнение к компасу)
  auto-open-menu: false
  # Слот компаса меню (0-8)
  menu-slot: 4

messages:
  prefix: "&8[&b&lAvelium&8] "
  no-permission: "&cУ вас нет прав!"
  welcome: "&aДобро пожаловать в лобби &bAvelium&a!"
  command-blocked: "&cВ лобби нельзя использовать команды!"
  build-blocked: "&cВ лобби нельзя строить/ломать!"
  spawn-set: "&aТочка спавна лобби установлена!"
  bedwars-coming-soon: "&cЭтот режим разрабатывается!"
  teleport-survival: "&aТелепортация в выживание..."
  teleport-bedwars: "&aТелепортация в BedWars..."
  no-last-location: "&eВы впервые в выживании, телепорт на спавн мира..."
  menu-item-name: "&b&l⭐ Меню Avelium &7(ПКМ)"

